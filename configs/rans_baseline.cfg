% ============================================================
%  SU2 v8 — RANS k-omega SST baseline
%  Jet impingente D_jet=1.5mm, U=10 m/s, Re=1000, aria 20C
%  Uso: fasi L1-L3 (500k -> 1.5M -> 3M celle, GCI Celik)
% ============================================================

% ---------------- SOLVER ----------------
SOLVER= INC_RANS
KIND_TURB_MODEL= SST
MATH_PROBLEM= DIRECT
RESTART_SOL= NO

% ---------------- INCOMPRESSIBILE ----------------
INC_DENSITY_MODEL= CONSTANT
INC_DENSITY_INIT= 1.225
INC_VELOCITY_INIT= (0.0, 0.0, -10.0)
INC_NONDIM= DIMENSIONAL
VISCOSITY_MODEL= CONSTANT_VISCOSITY
MU_CONSTANT= 1.8375E-5

% ---------------- TIME ----------------
TIME_DOMAIN= NO
ITER= 5000
CONV_RESIDUAL_MINVAL= -6

% ---------------- NUMERICS ----------------
CFL_NUMBER= 50.0
CFL_ADAPT= YES
CFL_ADAPT_PARAM= (0.1, 2.0, 1.0, 100.0)
NUM_METHOD_GRAD= WEIGHTED_LEAST_SQUARES
MUSCL_FLOW= YES
SLOPE_LIMITER_FLOW= VENKATAKRISHNAN
CONV_NUM_METHOD_FLOW= ROE
TIME_DISCRE_FLOW= EULER_IMPLICIT

% ---------------- BOUNDARY CONDITIONS ----------------
MARKER_INLET= ( jet_inlet, 293.15, 10.0, 0.0, 0.0, -1.0 )
MARKER_OUTLET= ( lateral_outlet, 0.0 )
MARKER_HEATFLUX= ( chip_wall, 0.0 )
MARKER_HEATFLUX= ( top_plate, 0.0 )
MARKER_HEATFLUX= ( inlet_tube_wall, 0.0 )

% ---------------- OUTPUT ----------------
OUTPUT_WRT_FREQ= 500
VOLUME_OUTPUT= COORDINATES, SOLUTION, PRIMITIVE, RESIDUAL
SCREEN_OUTPUT= (INNER_ITER, RMS_PRESSURE, RMS_VELOCITY-X, LINSOL_RESIDUAL)
HISTORY_OUTPUT= ITER, RMS_RES, AERO_COEFF
